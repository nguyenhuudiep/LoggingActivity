name: Deploy to Linux VPS

on:
  push:
    branches:
      - main
    paths:
      - 'LoggingActivity.Web/**'
      - '.github/workflows/deploy-linux-vps.yml'
      - '.github/workflows/deploy-linux-vps-reusable.yml'
      - 'LoggingActivity.sln'
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        default: production
        options:
          - production
          - staging
          - both

permissions:
  contents: read

jobs:
  deploy-production:
    if: github.event_name == 'push' || github.event.inputs.target == 'production' || github.event.inputs.target == 'both'
    uses: ./.github/workflows/deploy-linux-vps-reusable.yml
    with:
      environment_name: production
      keep_releases: 5
    secrets:
      VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
      VPS_PORT: ${{ secrets.PROD_VPS_PORT || '22' }}
      VPS_USER: ${{ secrets.PROD_VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
      VPS_SSH_PASSPHRASE: ${{ secrets.PROD_VPS_SSH_PASSPHRASE }}
      VPS_APP_ROOT: /var/www/logging
      VPS_SERVICE_NAME: ${{ secrets.PROD_VPS_SERVICE_NAME || '' }}
      VPS_HEALTHCHECK_URL: ${{ secrets.PROD_VPS_HEALTHCHECK_URL || '' }}

  deploy-staging:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'staging' || github.event.inputs.target == 'both')
    uses: ./.github/workflows/deploy-linux-vps-reusable.yml
    with:
      environment_name: staging
      keep_releases: 3
    secrets:
      VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
      VPS_PORT: ${{ secrets.STAGING_VPS_PORT || '22' }}
      VPS_USER: ${{ secrets.STAGING_VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.STAGING_VPS_SSH_KEY }}
      VPS_SSH_PASSPHRASE: ${{ secrets.STAGING_VPS_SSH_PASSPHRASE }}
      VPS_APP_ROOT: ${{ secrets.STAGING_VPS_APP_ROOT }}
      VPS_SERVICE_NAME: ${{ secrets.STAGING_VPS_SERVICE_NAME || '' }}
      VPS_HEALTHCHECK_URL: ${{ secrets.STAGING_VPS_HEALTHCHECK_URL || '' }}