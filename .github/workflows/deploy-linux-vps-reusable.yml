name: Reusable Deploy to Linux VPS

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      keep_releases:
        required: false
        type: number
        default: 5
    secrets:
      VPS_HOST:
        required: true
      VPS_PORT:
        required: false
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true
      VPS_SSH_PASSPHRASE:
        required: false
      VPS_APP_ROOT:
        required: true
      VPS_SERVICE_NAME:
        required: false
      VPS_HEALTHCHECK_URL:
        required: false
      APP_ASPNETCORE_ENVIRONMENT:
        required: false
      APP_ASPNETCORE_URLS:
        required: false
      APP_MONGODB_CONNECTION_STRING:
        required: false
      APP_MONGODB_DATABASE_NAME:
        required: false
      APP_SEEDADMIN_USERNAME:
        required: false
      APP_SEEDADMIN_EMAIL:
        required: false
      APP_SEEDADMIN_PASSWORD:
        required: false

concurrency:
  group: deploy-${{ inputs.environment_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_PATH: LoggingActivity.Web/LoggingActivity.Web.csproj
  PUBLISH_DIR: ./publish

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            LoggingActivity.Web/LoggingActivity.Web.csproj
            LoggingActivity.sln

      - name: Restore dependencies
        run: dotnet restore $PROJECT_PATH

      - name: Build application
        run: dotnet build $PROJECT_PATH --configuration Release --no-restore

      - name: Publish application
        run: dotnet publish $PROJECT_PATH --configuration Release --no-build --output $PUBLISH_DIR

      - name: Include nginx config in artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$PUBLISH_DIR/tools"
          cp tools/nginx.logging.conf "$PUBLISH_DIR/tools/nginx.logging.conf"

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: loggingactivity-publish-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.environment_name }}
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment_name }}

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: loggingactivity-publish-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.environment_name }}
          path: ./publish

      - name: Validate required deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ secrets.VPS_HOST }}" ] || (echo "Missing secret: VPS_HOST" && exit 1)
          [ -n "${{ secrets.VPS_USER }}" ] || (echo "Missing secret: VPS_USER" && exit 1)
          [ -n "${{ secrets.VPS_SSH_KEY }}" ] || (echo "Missing secret: VPS_SSH_KEY" && exit 1)
          [ -n "${{ secrets.VPS_APP_ROOT }}" ] || (echo "Missing secret: VPS_APP_ROOT" && exit 1)
          [ -n "${{ secrets.APP_MONGODB_CONNECTION_STRING }}" ] || (echo "Missing secret: APP_MONGODB_CONNECTION_STRING" && exit 1)

      - name: Verify SSH authentication
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          ssh -i "$HOME/.ssh/deploy_key" \
            -p "${{ secrets.VPS_PORT || '22' }}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "echo SSH auth success"

      - name: Upload release package to incoming folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: publish/*
          target: ${{ secrets.VPS_APP_ROOT }}/incoming/${{ github.run_id }}-${{ github.run_attempt }}
          strip_components: 1

      - name: Activate release with rollback on failed health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -euo pipefail

            APP_ROOT="${{ secrets.VPS_APP_ROOT }}"
            SERVICE_NAME="${{ secrets.VPS_SERVICE_NAME }}"
            SERVICE_UNIT="${SERVICE_NAME%.service}.service"
            SERVICE_USER="$(whoami)"
            HEALTHCHECK_URL="${{ secrets.VPS_HEALTHCHECK_URL }}"
            APP_ASPNETCORE_ENVIRONMENT="${{ secrets.APP_ASPNETCORE_ENVIRONMENT || 'Production' }}"
            APP_ASPNETCORE_URLS="${{ secrets.APP_ASPNETCORE_URLS || 'http://127.0.0.1:5005' }}"
            APP_MONGODB_CONNECTION_STRING="${{ secrets.APP_MONGODB_CONNECTION_STRING }}"
            APP_MONGODB_DATABASE_NAME="${{ secrets.APP_MONGODB_DATABASE_NAME }}"
            APP_SEEDADMIN_USERNAME="${{ secrets.APP_SEEDADMIN_USERNAME }}"
            APP_SEEDADMIN_EMAIL="${{ secrets.APP_SEEDADMIN_EMAIL }}"
            APP_SEEDADMIN_PASSWORD="${{ secrets.APP_SEEDADMIN_PASSWORD }}"
            KEEP_RELEASES=${{ inputs.keep_releases }}
            RELEASE_ID="${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}"

            RELEASES_DIR="$APP_ROOT/releases"
            INCOMING_DIR="$APP_ROOT/incoming/${{ github.run_id }}-${{ github.run_attempt }}"
            RELEASE_DIR="$RELEASES_DIR/$RELEASE_ID"
            CURRENT_LINK="$APP_ROOT/current"

            mkdir -p "$RELEASES_DIR"
            mkdir -p "$APP_ROOT/shared/logs"
            if [ ! -d "$INCOMING_DIR" ]; then
              echo "Incoming folder not found: $INCOMING_DIR"
              exit 1
            fi

            PREVIOUS_TARGET=""
            if [ -L "$CURRENT_LINK" ] || [ -e "$CURRENT_LINK" ]; then
              PREVIOUS_TARGET="$(readlink -f "$CURRENT_LINK" || true)"
            fi

            mkdir -p "$RELEASE_DIR"
            cp -a "$INCOMING_DIR"/. "$RELEASE_DIR"/
            rm -rf "$INCOMING_DIR"

            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

            printf '%s\n' \
              "ASPNETCORE_ENVIRONMENT=${APP_ASPNETCORE_ENVIRONMENT}" \
              "ASPNETCORE_URLS=${APP_ASPNETCORE_URLS}" \
              "MongoDb__ConnectionString=${APP_MONGODB_CONNECTION_STRING}" \
              "MongoDb__DatabaseName=${APP_MONGODB_DATABASE_NAME}" \
              "SeedAdmin__UserName=${APP_SEEDADMIN_USERNAME}" \
              "SeedAdmin__Email=${APP_SEEDADMIN_EMAIL}" \
              "SeedAdmin__Password=${APP_SEEDADMIN_PASSWORD}" \
              > "$APP_ROOT/shared/runtime.env"
            chmod 600 "$APP_ROOT/shared/runtime.env"

            printf '%s\n' \
              '#!/usr/bin/env bash' \
              'set -euo pipefail' \
              'APP_ROOT="__APP_ROOT__"' \
              'set -a' \
              '[ -f "$APP_ROOT/shared/runtime.env" ] && . "$APP_ROOT/shared/runtime.env"' \
              '[ -f "$APP_ROOT/shared/app.env" ] && . "$APP_ROOT/shared/app.env"' \
              'set +a' \
              'exec dotnet "$APP_ROOT/current/LoggingActivity.Web.dll"' \
              > "$APP_ROOT/shared/run-current.sh"
            sed -i "s|__APP_ROOT__|$APP_ROOT|g" "$APP_ROOT/shared/run-current.sh"
            chmod +x "$APP_ROOT/shared/run-current.sh"

            restart_by_process() {
              ENV_FILE="$APP_ROOT/shared/app.env"
              PID_FILE="$APP_ROOT/shared/loggingactivity.pid"
              mkdir -p "$APP_ROOT/shared/logs"
              # Prefer runtime values from secrets; optional fallback file may override.
              export ASPNETCORE_ENVIRONMENT="$APP_ASPNETCORE_ENVIRONMENT"
              export ASPNETCORE_URLS="$APP_ASPNETCORE_URLS"
              export MongoDb__ConnectionString="$APP_MONGODB_CONNECTION_STRING"
              export MongoDb__DatabaseName="$APP_MONGODB_DATABASE_NAME"
              export SeedAdmin__UserName="$APP_SEEDADMIN_USERNAME"
              export SeedAdmin__Email="$APP_SEEDADMIN_EMAIL"
              export SeedAdmin__Password="$APP_SEEDADMIN_PASSWORD"

              if [ -f "$ENV_FILE" ]; then
                set -a
                # shellcheck disable=SC1090
                . "$ENV_FILE"
                set +a
              fi

              [ -n "${MongoDb__ConnectionString:-}" ] || (echo "Missing runtime value: MongoDb__ConnectionString" && exit 1)

              if [ -f "$PID_FILE" ]; then
                OLD_PID="$(cat "$PID_FILE" || true)"
                if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
                  kill "$OLD_PID" || true
                  sleep 2
                fi
              fi

              nohup dotnet "$CURRENT_LINK/LoggingActivity.Web.dll" > "$APP_ROOT/shared/logs/app.log" 2>&1 < /dev/null &
              NEW_PID=$!
              echo "$NEW_PID" > "$PID_FILE"
              sleep 2
              kill -0 "$NEW_PID" 2>/dev/null
            }

            RESTARTED=0

            if [ -n "$SERVICE_NAME" ]; then
              sudo systemctl daemon-reload
              if ! sudo systemctl list-unit-files --type=service --no-legend | awk '{print $1}' | grep -Fxq "$SERVICE_UNIT"; then
                echo "Systemd unit not found: $SERVICE_UNIT"
                echo "Creating standard systemd unit automatically."
                echo "Available service names containing 'logging' or 'activity':"
                sudo systemctl list-unit-files --type=service --no-legend | awk '{print $1}' | grep -Ei 'logging|activity' || true

                printf '%s\n' \
                  '[Unit]' \
                  'Description=LoggingActivity (managed by CI)' \
                  'After=network.target' \
                  '' \
                  '[Service]' \
                  'Type=simple' \
                  "User=$SERVICE_USER" \
                  "WorkingDirectory=$APP_ROOT/current" \
                  "ExecStart=$APP_ROOT/shared/run-current.sh" \
                  'Restart=always' \
                  'RestartSec=5' \
                  '' \
                  '[Install]' \
                  'WantedBy=multi-user.target' \
                  | sudo tee "/etc/systemd/system/$SERVICE_UNIT" > /dev/null

                sudo systemctl daemon-reload
                sudo systemctl enable "$SERVICE_UNIT"
              fi
              if [ -n "$SERVICE_NAME" ]; then
                sudo systemctl restart "$SERVICE_UNIT"
                sudo systemctl is-active --quiet "$SERVICE_UNIT"
                RESTARTED=1
              fi
            fi

            if [ "$RESTARTED" -eq 0 ]; then
              restart_by_process
              RESTARTED=1
            fi

            HEALTH_OK=1
            if [ "$RESTARTED" -eq 1 ] && [ -n "$HEALTHCHECK_URL" ]; then
              HEALTH_OK=0
              for _ in $(seq 1 20); do
                if curl -fsS --max-time 5 "$HEALTHCHECK_URL" >/dev/null; then
                  HEALTH_OK=1
                  break
                fi
                sleep 2
              done
            fi

            if [ "$HEALTH_OK" -ne 1 ]; then
              echo "Health check failed. Rolling back to previous release."
              if [ -n "$PREVIOUS_TARGET" ] && [ -d "$PREVIOUS_TARGET" ]; then
                ln -sfn "$PREVIOUS_TARGET" "$CURRENT_LINK"
                if [ -n "$SERVICE_NAME" ]; then
                  sudo systemctl restart "$SERVICE_UNIT"
                  sudo systemctl is-active --quiet "$SERVICE_UNIT"
                else
                  restart_by_process || true
                fi
              fi

              if [ -n "$SERVICE_NAME" ]; then
                sudo systemctl status "$SERVICE_UNIT" --no-pager || true
              fi
              exit 1
            fi

            if [ -n "$SERVICE_NAME" ]; then
              sudo systemctl status "$SERVICE_UNIT" --no-pager
            fi

            NGINX_SOURCE_CONF="$CURRENT_LINK/tools/nginx.logging.conf"
            NGINX_TARGET_CONF="/etc/nginx/sites-available/logging"

            if [ ! -f "$NGINX_SOURCE_CONF" ]; then
              echo "Missing nginx config in release: $NGINX_SOURCE_CONF"
              exit 1
            fi

            sudo cp "$NGINX_SOURCE_CONF" "$NGINX_TARGET_CONF"
            sudo test -f "$NGINX_TARGET_CONF"
            sudo ln -sfn /etc/nginx/sites-available/logging /etc/nginx/sites-enabled/logging
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl reload nginx

            echo "Last 80 lines of app log:"
            tail -n 80 "$APP_ROOT/shared/logs/app.log" || true

            if [ "$KEEP_RELEASES" -gt 0 ]; then
              cd "$RELEASES_DIR"
              ls -1dt */ | tail -n +$((KEEP_RELEASES + 1)) | xargs -r rm -rf
            fi
